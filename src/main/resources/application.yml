spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: water-tariff

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/watertariff}
    username: ${DB_USERNAME:watertariffadmin}
    password: ${DB_PASSWORD:supersecretpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
